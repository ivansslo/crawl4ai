# Render Blueprint — https://render.com/docs/blueprint-spec
# This file enables 1-click deploy of the Zapier webhook server.

services:
  - type: web
    name: crawl4ai-zapier-webhook
    env: python
    rootDir: zapier-webhook
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: PORT
        value: "5000"
